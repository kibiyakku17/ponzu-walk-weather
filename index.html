<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7FA889">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ぽんずさんぽ">
<title>ぽんずさんぽ</title>
<link rel="manifest" href="ponzu-walk-weather-manifest.webmanifest">
<link rel="apple-touch-icon" href="ponzu-walk-weather-icon-180.png">
<link rel="icon" type="image/png" href="ponzu-walk-weather-favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1EA;
  --panel:#fff;
  --ink:#30322D;
  --muted:#888B7E;
  --line:#E0DDD2;
  --soft:#F7F6EF;
  --sage:#7FA889;   --sage-s:#E4EFE3;
  --coral:#EFA888;  --coral-s:#FBE9E0;
  --sky:#8FBED4;    --sky-s:#E4F0F4;
  --amber:#E5B65C;  --amber-s:#FBF1DC;
  --rose:#DD9A9A;   --rose-s:#FBEAE9;
  --lavender:#B6A4D6;
  /* 4段階カラー */
  --c-green:#4caf6e;  --c-green-s:#e6f5ec;  --c-green-b:#b7dfc5;
  --c-yellow:#d4a017; --c-yellow-s:#fdf6dc;  --c-yellow-b:#f0d97a;
  --c-orange:#e07840; --c-orange-s:#fdf0e6;  --c-orange-b:#f0b88a;
  --c-red:#d94040;    --c-red-s:#fdeaea;     --c-red-b:#f0a0a0;
  --shadow:0 4px 18px rgba(48,50,45,.08);
  --shadow-sm:0 2px 8px rgba(48,50,45,.05);
}
*{ box-sizing:border-box; }
body{
  margin:0; min-height:100vh;
  background:linear-gradient(165deg,#F5F7F0 0%,var(--bg) 60%,#E8EDE4 100%);
  color:var(--ink);
  font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{ max-width:480px; margin:0 auto; padding:20px 16px calc(40px + env(safe-area-inset-bottom)); }

/* ── header ── */
.header{ margin-bottom:16px; display:flex; align-items:flex-start; justify-content:space-between; }
.header-left{}
.eyebrow{ margin:0 0 4px; font-size:11px; font-weight:700; letter-spacing:.18em; color:var(--muted); font-family:'Zen Maru Gothic',sans-serif; }
h1{ margin:0 0 4px; font-size:22px; font-weight:900; font-family:'Zen Maru Gothic',sans-serif; }
.location-line{ font-size:12px; color:var(--muted); }
.settings-btn{
  background:var(--soft); border:1px solid var(--line); border-radius:999px;
  padding:6px 10px; font-size:12px; cursor:pointer; color:var(--muted);
  font-family:'Zen Kaku Gothic New',sans-serif; white-space:nowrap; flex-shrink:0;
  margin-top:2px;
}
.settings-btn:active{ background:var(--line); }

/* ── day tabs ── */
.day-tabs{
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
  margin-bottom:16px;
}
.day-tab{
  border:1px solid var(--line); border-radius:14px;
  padding:10px 0; text-align:center; cursor:pointer;
  background:var(--panel); font-family:'Zen Maru Gothic',sans-serif;
  transition:all .15s;
}
.day-tab .dt-label{ font-size:11px; color:var(--muted); font-weight:700; }
.day-tab .dt-date{ font-size:14px; font-weight:900; margin:2px 0; }
.day-tab .dt-weather{ font-size:20px; line-height:1; }
.day-tab.active{ background:var(--sage); border-color:var(--sage); color:#fff; }
.day-tab.active .dt-label{ color:rgba(255,255,255,.8); }

/* ── hero card (v6) ── */
.hero{
  background:var(--panel); border:2px solid var(--hero-border, var(--line));
  border-radius:20px; padding:18px 18px 16px;
  margin-bottom:14px; box-shadow:var(--shadow);
}
.hero-label{ font-size:11px; font-weight:700; letter-spacing:.12em; color:var(--muted); margin-bottom:6px; font-family:'Zen Maru Gothic',sans-serif; }
.hero-main{ display:flex; align-items:center; gap:12px; }
.hero-icon{ font-size:40px; line-height:1; flex-shrink:0; }
.hero-text h2{ margin:0 0 4px; font-size:20px; font-weight:900; font-family:'Zen Maru Gothic',sans-serif; line-height:1.2; }
.hero-text p{ margin:0; font-size:13px; color:var(--muted); line-height:1.5; }

/* ── 24h chip grid ── */
.timeline{ margin-bottom:14px; }
.section-title{
  font-family:'Zen Maru Gothic',sans-serif; font-size:13px; font-weight:900;
  color:var(--muted); margin:0 0 8px; display:flex; align-items:center; gap:8px; letter-spacing:.05em;
}
.section-title::after{ content:""; height:1px; flex:1; background:var(--line); }
.chips24{
  display:grid; grid-template-columns:repeat(6,1fr); gap:4px;
}
.chip24{
  border-radius:10px; border:1px solid var(--line);
  padding:6px 2px 5px; text-align:center; background:#fff;
}
.chip24.lv0{ background:var(--c-green-s); border-color:var(--c-green-b); }
.chip24.lv1{ background:var(--c-yellow-s); border-color:var(--c-yellow-b); }
.chip24.lv2{ background:var(--c-orange-s); border-color:var(--c-orange-b); }
.chip24.lv3{ background:var(--c-red-s); border-color:var(--c-red-b); }
.chip24.past{ opacity:.35; }
.chip24 .c-hour{ font-size:10px; color:var(--muted); font-weight:700; display:block; }
.chip24 .c-emoji{ font-size:14px; display:block; margin:2px 0 1px; line-height:1; }

/* ── gear ── */
.gear-section{ margin-bottom:14px; }
.gear-card{
  background:var(--panel); border:1px solid var(--line);
  border-radius:14px; padding:12px 14px; margin-bottom:8px;
  box-shadow:var(--shadow-sm);
}
.gear-card-title{ font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px; font-family:'Zen Maru Gothic',sans-serif; }
.gear-list-inner{ display:flex; flex-direction:column; gap:5px; }
.gear-item{
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:10px; font-size:13px;
  background:var(--soft); border:1px solid var(--line);
}
.gear-badge{
  font-size:10px; font-weight:700; border-radius:999px;
  padding:2px 7px; white-space:nowrap; flex-shrink:0;
}
.badge-must{ background:var(--sage-s); color:var(--sage); border:1px solid var(--sage); }
.badge-good{ background:var(--amber-s); color:#a07800; border:1px solid var(--amber); }
.badge-rec{ background:var(--sky-s); color:#3a7aa0; border:1px solid var(--sky); }
.gear-icon{ font-size:17px; line-height:1; flex-shrink:0; }
.gear-label{ flex:1; }

/* ── advice ── */
.advice{
  border-radius:14px; padding:12px 14px; margin-bottom:10px;
  font-size:13px; line-height:1.6; border:1px solid transparent;
}
.advice.rain{ background:#EEF4FB; border-color:#9FC2E0; }
.advice.heat{ background:var(--amber-s); border-color:var(--amber); }
.advice.cold{ background:var(--sky-s); border-color:var(--sky); }
.advice b{ display:block; margin-bottom:4px; font-family:'Zen Maru Gothic',sans-serif; }
.advice ul{ margin:2px 0 0; padding:0 0 0 16px; font-size:12px; }
.advice ul li{ margin-bottom:1px; }

/* ── misc ── */
.updated{ font-size:11px; color:var(--muted); margin:0 0 14px; }
.loading{ text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
.error{ background:var(--rose-s); border:1px solid var(--rose); border-radius:14px; padding:14px; font-size:13px; }
.error button{ margin-top:8px; border:1px solid var(--rose); background:#fff; border-radius:999px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; }
.note{ font-size:11px; color:var(--muted); line-height:1.7; margin-top:18px; }
.hidden{ display:none !important; }

/* ── sensitivity modal ── */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal-backdrop.hidden{ display:none; }
.modal{
  background:#fff; border-radius:20px; padding:24px;
  max-width:340px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.modal h2{ font-family:'Zen Maru Gothic',sans-serif; font-size:18px; font-weight:900; margin:0 0 6px; }
.modal p{ font-size:13px; color:var(--muted); margin:0 0 16px; line-height:1.6; }
.sensitivity-opts{ display:grid; gap:8px; }
.sens-btn{
  border:2px solid var(--line); border-radius:14px; padding:12px 14px;
  background:var(--soft); font-size:14px; font-family:'Zen Maru Gothic',sans-serif;
  font-weight:700; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px;
  transition:border-color .15s, background .15s;
}
.sens-btn:hover, .sens-btn.selected{ border-color:var(--sage); background:var(--sage-s); }
.sens-btn .sens-sub{ font-size:11px; color:var(--muted); font-weight:400; display:block; margin-top:1px; }
.modal-save{
  margin-top:16px; width:100%; padding:13px;
  background:var(--sage); color:#fff; border:none; border-radius:12px;
  font-size:15px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <p class="eyebrow">WALK CONCIERGE</p>
      <h1>🐾 ぽんずさんぽ</h1>
      <p class="location-line" id="locationLine">位置情報を取得中…</p>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️ 暑さ・寒さ設定</button>
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div id="main" class="loading">📍 位置情報を取得中…</div>

  <p class="note">判定基準：気温・路面温度・湿度・UV指数・風速・降水確率。降水確率50%以上は🔴。<br>データ提供：Open-Meteo</p>
</div>

<!-- 暑さ・寒さ設定モーダル -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>🐶 暑さ・寒さの感じ方</h2>
    <p>ぽんずの体質に合わせて設定してね。後からいつでも変更できるよ。</p>
    <div class="sensitivity-opts" id="sensitivityOpts">
      <button class="sens-btn" data-val="hot">
        🥵 暑がり
        <span class="sens-sub">暑さに弱い・夏に特に注意したい</span>
      </button>
      <button class="sens-btn" data-val="normal">
        😊 標準
        <span class="sens-sub">特に気にならない</span>
      </button>
      <button class="sens-btn" data-val="cold">
        🥶 寒がり
        <span class="sens-sub">寒さに弱い・冬に特に注意したい</span>
      </button>
    </div>
    <button class="modal-save" id="modalSave">保存する</button>
  </div>
</div>

<script>
// ── 定数 ──────────────────────────────────────────────────
const FALLBACK_LAT = 35.6762, FALLBACK_LON = 139.6503;
const RAIN_CODES = new Set([51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99]);
const SNOW_CODES = new Set([71,73,75,77,85,86]);
const LEVEL = { GREEN:0, YELLOW:1, ORANGE:2, RED:3 };
const LEVEL_EMOJI = ['🟢','🟡','🟠','🔴'];
const LEVEL_CLASS = ['lv0','lv1','lv2','lv3'];

// ── dogProfile ────────────────────────────────────────────
// heatSensitivity: 'hot'|'normal'|'cold'
// coldSensitivity は heatSensitivity と連動（暑がり → 寒さ耐性強め → 補正なし）
// 将来: breed, age, weight, coat, senior などを追加可能
function loadProfile() {
  try { return JSON.parse(localStorage.getItem('dogProfile')) || {}; } catch { return {}; }
}
function saveProfile(p) {
  localStorage.setItem('dogProfile', JSON.stringify(p));
}
let dogProfile = loadProfile();

// 補正値取得
function getSensitivityOffset() {
  const s = dogProfile.heatSensitivity || 'normal';
  // 暑がり: 暑さ閾値を -2℃（より早く警戒）, 寒さ閾値を +0
  // 寒がり: 暑さ閾値を +0, 寒さ閾値を +2℃（より早く警戒）
  return {
    heat: s === 'hot' ? -2 : 0,
    cold: s === 'cold' ? 2 : 0,
  };
}

// ── 天気アイコン ──────────────────────────────────────────
function wIcon(code) {
  if(code===0)return"☀️"; if(code===1)return"🌤️"; if(code===2)return"⛅"; if(code===3)return"☁️";
  if(code===45||code===48)return"🌫️";
  if([51,53,55,56,57].includes(code))return"🌦️";
  if([61,63,65,66,67,80,81,82].includes(code))return"🌧️";
  if(SNOW_CODES.has(code))return"🌨️";
  if([95,96,99].includes(code))return"⛈️";
  return"❓";
}

// ── 路面温度推定 ─────────────────────────────────────────
function roadTemp(temp, code) {
  return temp + (code===0?12 : code===1?8 : code===2?5 : code===3?2 : 0);
}

// ── 体感温度（簡易ウィンドチル） ─────────────────────────
function feelsLikeCold(temp, wind) {
  return temp - Math.min(wind * 0.5, 5);
}

// ── 4段階快適度判定 ──────────────────────────────────────
function calcLevel({ temp, code, precip, humidity, wind, uv }) {
  const off = getSensitivityOffset();

  // 雨・雪 → 即🔴
  if (RAIN_CODES.has(code) || precip >= 50) return LEVEL.RED;

  const road = roadTemp(temp, code);
  const feels = feelsLikeCold(temp, wind);

  // 暑さ判定（閾値に heat オフセット適用）
  function heatLevel() {
    const ho = off.heat; // 暑がりなら -2（閾値が下がる）
    if (road >= 42+ho || temp >= 31+ho || (temp >= 28+ho && humidity >= 80)) return LEVEL.RED;
    if (road >= 36+ho || temp >= 28+ho || (temp >= 25+ho && (uv||0) >= 7)) return LEVEL.ORANGE;
    if (temp >= 25+ho || road >= 30+ho || (uv||0) >= 6) return LEVEL.YELLOW;
    return LEVEL.GREEN;
  }

  // 寒さ判定（閾値に cold オフセット適用）
  function coldLevel() {
    const co = off.cold; // 寒がりなら +2（閾値が上がる）
    if (feels <= -2+co) return LEVEL.RED;
    if (feels <= 2+co || (temp <= 5+co && wind >= 8)) return LEVEL.ORANGE;
    if (feels <= 7+co) return LEVEL.YELLOW;
    return LEVEL.GREEN;
  }

  return Math.max(heatLevel(), coldLevel());
}

// ── 雨上がり判定 ─────────────────────────────────────────
function checkRainAfter(data, nowHour) {
  for (let h = Math.max(0, nowHour-3); h < nowHour; h++) {
    if (data[h] && RAIN_CODES.has(data[h].code)) return true;
  }
  return false;
}

// ── 位置情報 ─────────────────────────────────────────────
function getLocation() {
  return new Promise(resolve => {
    if (!('geolocation' in navigator)) { resolve({lat:FALLBACK_LAT,lon:FALLBACK_LON,source:'fallback'}); return; }
    navigator.geolocation.getCurrentPosition(
      p => resolve({lat:p.coords.latitude, lon:p.coords.longitude, source:'gps'}),
      () => resolve({lat:FALLBACK_LAT, lon:FALLBACK_LON, source:'fallback'}),
      {enableHighAccuracy:false, timeout:8000, maximumAge:600000}
    );
  });
}

// ── 状態 ─────────────────────────────────────────────────
let appData = null;
let activeDay = 0;

// ── メインロード ─────────────────────────────────────────
async function loadForecast() {
  const main = document.getElementById('main');
  main.className = 'loading'; main.textContent = '📍 位置情報を取得中…';
  try {
    const loc = await getLocation();
    main.textContent = '⛅ 天気予報を取得中…';

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
      + `&hourly=temperature_2m,precipitation_probability,weathercode,relative_humidity_2m,wind_speed_10m,uv_index`
      + `&timezone=Asia%2FTokyo&forecast_days=2`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();

    const { time, temperature_2m, precipitation_probability, weathercode,
            relative_humidity_2m, wind_speed_10m, uv_index } = data.hourly;

    const byDate = {};
    time.forEach((t, idx) => {
      const [dp, tp] = t.split('T'); const h = parseInt(tp);
      if (!byDate[dp]) byDate[dp] = {};
      byDate[dp][h] = {
        temp: temperature_2m[idx],
        code: weathercode[idx],
        precip: precipitation_probability[idx],
        humidity: relative_humidity_2m[idx],
        wind: wind_speed_10m[idx],
        uv: uv_index[idx],
      };
    });

    const now = new Date(), pad = n => String(n).padStart(2,'0');
    const mkStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const tom = new Date(now.getTime()+86400000);
    const todayStr = mkStr(now), tomStr = mkStr(tom);
    const nowInfo = { dateStr:todayStr, hour:now.getHours() };
    const dowL = ['日','月','火','水','木','金','土'];

    const days = [
      { dateStr:todayStr, date:now, label:'今日', dow:dowL[now.getDay()] },
      { dateStr:tomStr,   date:tom, label:'明日', dow:dowL[tom.getDay()] },
    ];

    appData = { byDate, days, nowInfo, loc };

    const locLabel = loc.source==='gps' ? '現在地' : '東京（デフォルト）';
    document.getElementById('locationLine').textContent =
      `📍 ${locLabel} ／ ${now.getMonth()+1}/${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())}取得`;

    renderDayTabs();
    renderDay(0);

  } catch(e) {
    main.className = '';
    main.innerHTML = `<div class="error">天気予報を取得できなかったよ。<br><button onclick="loadForecast()">再読み込み</button></div>`;
  }
}

// ── タブ描画 ─────────────────────────────────────────────
function renderDayTabs() {
  const el = document.getElementById('dayTabs');
  const { byDate, days } = appData;
  el.innerHTML = days.map((day, i) => {
    const data = byDate[day.dateStr] || {};
    const repCode = data[12] ? data[12].code : (data[9] ? data[9].code : 0);
    return `<button class="day-tab${i===activeDay?' active':''}" onclick="renderDay(${i})">
      <div class="dt-label">${day.label}（${day.dow}）</div>
      <div class="dt-weather">${wIcon(repCode)}</div>
      <div class="dt-date">${day.date.getMonth()+1}/${day.date.getDate()}</div>
    </button>`;
  }).join('');
}

// ── 日別描画 ─────────────────────────────────────────────
function renderDay(idx) {
  activeDay = idx;
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));

  const { byDate, days, nowInfo } = appData;
  const day = days[idx];
  const data = byDate[day.dateStr] || {};
  const nowHour = nowInfo.hour;
  const isToday = day.dateStr === nowInfo.dateStr;
  const rainAfter = isToday && checkRainAfter(data, nowHour);

  // 全24時間の判定
  const hours = Array.from({length:24}, (_, h) => {
    const d = data[h];
    if (!d) return { h, level: LEVEL.RED, d: null, isPast: isToday && h < nowHour };
    const level = calcLevel(d);
    const isPast = isToday && h < nowHour;
    return { h, level, d, isPast };
  });

  // ベスト時間（未来・非雨）
  const future = hours.filter(x => !x.isPast && x.d && x.level < LEVEL.RED);
  const bestHour = future.length ? future.reduce((a,b) => a.level <= b.level ? a : b) : null;

  const main = document.getElementById('main');
  main.className = '';

  let html = '';
  html += buildHero(bestHour, isToday, hours);
  html += buildTimeline24(hours);
  html += buildGear(data, nowHour, hours, isToday, rainAfter);
  html += buildAdvice(data, nowHour, hours, isToday, rainAfter);

  main.innerHTML = html;
}

// ── Hero カード ──────────────────────────────────────────
function buildHero(bestHour, isToday, hours) {
  const label = isToday ? "TODAY'S BEST" : "TOMORROW'S BEST";

  if (!bestHour) {
    return `<div class="hero" style="--hero-border:var(--c-red-b)">
      <div class="hero-label">${label}</div>
      <div class="hero-main">
        <div class="hero-icon">🔴</div>
        <div class="hero-text">
          <h2>今日の散歩は避けてね</h2>
          <p>雨・高温・強風などにより<br>お散歩に向かない状況が続いています</p>
        </div>
      </div>
    </div>`;
  }

  const lv = bestHour.level;
  const icons = ['🟢','🟡','🟠','🔴'];
  const borders = ['var(--c-green-b)','var(--c-yellow-b)','var(--c-orange-b)','var(--c-red-b)'];
  const msgs = [
    ['今日は最高の散歩日和！', 'お散歩に向いている時間があるよ'],
    ['様子を見ながら行けるよ', '少し暑め／寒めだけど無理なく'],
    ['注意しながらなら行けるかも', '短めにして無理しないで'],
    ['散歩は厳しそうな時間帯が多い', '無理せず今日はお休みでもいいよ'],
  ];
  const [msg1, msg2] = msgs[lv];

  return `<div class="hero" style="--hero-border:${borders[lv]}">
    <div class="hero-label">${label}</div>
    <div class="hero-main">
      <div class="hero-icon">${icons[lv]}</div>
      <div class="hero-text">
        <h2>${msg1}</h2>
        <p>${msg2}${lv < LEVEL.RED ? `<br>${bestHour.h}時台がいちばんおすすめ 🐾` : ''}</p>
      </div>
    </div>
  </div>`;
}

// ── 24時間チップ ─────────────────────────────────────────
function buildTimeline24(hours) {
  const chips = hours.map(({ h, level, d, isPast }) => {
    const emoji = d ? LEVEL_EMOJI[level] : '🔴';
    return `<div class="chip24 ${LEVEL_CLASS[level]}${isPast?' past':''}">
      <span class="c-hour">${h}時</span>
      <span class="c-emoji">${emoji}</span>
    </div>`;
  }).join('');

  return `<div class="timeline">
    <div class="section-title">時間ごとの快適度</div>
    <div class="chips24">${chips}</div>
  </div>`;
}

// ── 持ち物 ───────────────────────────────────────────────
function buildGear(data, nowHour, hours, isToday, rainAfter) {
  const future = hours.filter(x => !x.isPast && x.d);
  const hasHot  = future.some(x => x.level >= LEVEL.ORANGE && x.d.temp >= 25);
  const hasCold = future.some(x => x.level >= LEVEL.ORANGE && x.d.temp <= 5);
  const hasHotYellow = future.some(x => x.level >= LEVEL.YELLOW && x.d.temp >= 22);
  const hasNight = future.some(x => x.h >= 19 || x.h <= 5);
  const hasRain = future.some(x => x.level === LEVEL.RED && x.d && (RAIN_CODES.has(x.d.code) || x.d.precip >= 50));
  const hasSunny = future.some(x => x.d && (x.d.code === 0 || x.d.code === 1));

  // 🐶 犬用
  const dogGear = [
    { icon:'💩', label:'うんち袋', badge:'must' },
    { icon:'🪣', label:'携帯水容器', badge:'must' },
  ];
  if (rainAfter) dogGear.push({ icon:'🧻', label:'足拭きタオル', badge:'must' });
  else dogGear.push({ icon:'🧻', label:'足拭きタオル', badge:'good' });
  if (hasSunny) dogGear.push({ icon:'🕶', label:'UVカット帽子', badge:'good' });
  if (hasHotYellow) dogGear.push({ icon:'❄️', label:'冷感ネックリング', badge: hasHot ? 'must' : 'good' });
  if (hasNight) dogGear.push({ icon:'💡', label:'ライト', badge:'rec' });
  if (hasRain) dogGear.push({ icon:'☂️', label:'雨具・カッパ', badge:'rec' });
  if (hasCold) dogGear.push({ icon:'🧥', label:'ぽんずのウェア', badge:'rec' });

  // 👤 飼い主用
  const ownerGear = [];
  if (hasHot) {
    ownerGear.push({ icon:'🧢', label:'帽子', badge:'good' });
    ownerGear.push({ icon:'💧', label:'飲み物', badge:'good' });
    ownerGear.push({ icon:'❄️', label:'冷感ネックリング・汗拭きタオル', badge:'rec' });
  }
  if (hasCold) {
    ownerGear.push({ icon:'🧤', label:'手袋・ネックウォーマー', badge:'good' });
    ownerGear.push({ icon:'🧥', label:'上着', badge:'good' });
  }
  if (rainAfter) {
    ownerGear.push({ icon:'🧻', label:'タオル', badge:'must' });
    ownerGear.push({ icon:'👟', label:'汚れてもよい靴', badge:'good' });
  }
  if (hasNight) {
    ownerGear.push({ icon:'🔦', label:'ライト', badge:'must' });
    ownerGear.push({ icon:'🦺', label:'反射材', badge:'good' });
  }

  const badgeMap = {
    must: ['badge-must', '🟢 必須'],
    good: ['badge-good', '🟡 あると良い'],
    rec:  ['badge-rec',  '🔵 推奨'],
  };

  function renderItems(items) {
    return items.map(g => {
      const [cls, txt] = badgeMap[g.badge];
      return `<div class="gear-item">
        <span class="gear-icon">${g.icon}</span>
        <span class="gear-label">${g.label}</span>
        <span class="gear-badge ${cls}">${txt}</span>
      </div>`;
    }).join('');
  }

  let html = `<div class="gear-section"><div class="section-title">持ち物・装備</div>`;
  html += `<div class="gear-card"><div class="gear-card-title">🐶 犬用</div><div class="gear-list-inner">${renderItems(dogGear)}</div></div>`;
  if (ownerGear.length) {
    html += `<div class="gear-card"><div class="gear-card-title">👤 飼い主用</div><div class="gear-list-inner">${renderItems(ownerGear)}</div></div>`;
  }
  html += `</div>`;
  return html;
}

// ── アドバイスバナー ──────────────────────────────────────
function buildAdvice(data, nowHour, hours, isToday, rainAfter) {
  let html = '';
  const future = hours.filter(x => !x.isPast && x.d);

  if (rainAfter) {
    html += `<div class="advice rain">
      <b>☔ 雨上がりです</b>
      <ul>
        <li>草むら注意！足やお腹が濡れる可能性があります</li>
        <li>帰宅後に足拭きタオルを準備しておこう</li>
        <li>肉球チェックも忘れずに🐾</li>
      </ul>
    </div>`;
  }

  const hasHeat = future.some(x => x.level >= LEVEL.ORANGE && x.d.temp >= 25);
  if (hasHeat) {
    html += `<div class="advice heat">
      <b>☀️ 暑さ・日差しに要注意</b>
      <ul>
        <li>冷感ネックリングをつけてあげよう</li>
        <li>帽子・日陰ルートを意識して</li>
        <li>水を持参して、こまめに水分補給💧</li>
        <li>出発前にアスファルトを手で触って確認</li>
      </ul>
    </div>`;
  }

  const hasCold = future.some(x => x.level >= LEVEL.ORANGE && x.d.temp <= 5);
  if (hasCold) {
    html += `<div class="advice cold">
      <b>🧊 寒さに注意</b>
      <ul>
        <li>ぽんずのウェアや靴下も検討してみてね</li>
        <li>短め・速歩きで体を温める散歩がおすすめ</li>
        <li>帰宅後は体を温めてあげよう🐶</li>
      </ul>
    </div>`;
  }

  return html;
}

// ── 設定モーダル ─────────────────────────────────────────
function openSettingsModal() {
  const current = dogProfile.heatSensitivity || 'normal';
  document.querySelectorAll('.sens-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.val === current);
  });
  document.getElementById('modalBackdrop').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.add('hidden');
}

document.querySelectorAll('.sens-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sens-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

document.getElementById('modalSave').addEventListener('click', () => {
  const selected = document.querySelector('.sens-btn.selected');
  if (selected) {
    dogProfile.heatSensitivity = selected.dataset.val;
    saveProfile(dogProfile);
  }
  closeModal();
  if (appData) renderDay(activeDay);
});

document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
});

document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);

// 初回設定
if (!dogProfile.heatSensitivity) openSettingsModal();

// ── 起動 ─────────────────────────────────────────────────
loadForecast();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
