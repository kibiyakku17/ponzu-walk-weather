<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7FA889">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ぽんずさんぽ">
<title>ぽんずさんぽ</title>
<link rel="manifest" href="ponzu-walk-weather-manifest.webmanifest">
<link rel="apple-touch-icon" href="ponzu-walk-weather-icon-180.png">
<link rel="icon" type="image/png" href="ponzu-walk-weather-favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1EA;
  --panel:#fff;
  --ink:#30322D;
  --muted:#888B7E;
  --line:#E0DDD2;
  --soft:#F7F6EF;
  --sage:#7FA889;   --sage-s:#E4EFE3;
  --coral:#EFA888;  --coral-s:#FBE9E0;
  --sky:#8FBED4;    --sky-s:#E4F0F4;
  --amber:#E5B65C;  --amber-s:#FBF1DC;
  --rose:#DD9A9A;   --rose-s:#FBEAE9;
  --lavender:#B6A4D6;
  --c-green:#4caf6e;  --c-green-s:#e6f5ec;  --c-green-b:#9dd4b0;
  --c-yellow:#c49a00; --c-yellow-s:#fdf6dc;  --c-yellow-b:#e8cc6a;
  --c-orange:#d06030; --c-orange-s:#fdf0e6;  --c-orange-b:#e8a070;
  --c-red:#c83030;    --c-red-s:#fdeaea;     --c-red-b:#e89090;
  --shadow:0 4px 18px rgba(48,50,45,.08);
  --shadow-sm:0 2px 8px rgba(48,50,45,.05);
}
*{ box-sizing:border-box; }
body{
  margin:0; min-height:100vh;
  background:linear-gradient(165deg,#F5F7F0 0%,var(--bg) 60%,#E8EDE4 100%);
  color:var(--ink);
  font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{ max-width:480px; margin:0 auto; padding:20px 0 40px; }

/* ── header ── */
.header{ padding:0 16px; margin-bottom:16px; display:flex; align-items:flex-start; justify-content:space-between; }
.header-left{}
.eyebrow{ margin:0 0 4px; font-size:11px; font-weight:700; letter-spacing:.18em; color:var(--muted); font-family:'Zen Maru Gothic',sans-serif; }
h1{ margin:0 0 4px; font-size:22px; font-weight:900; font-family:'Zen Maru Gothic',sans-serif; }
.location-line{ font-size:12px; color:var(--muted); }
.header-btns{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; margin-top:2px; }
.icon-btn{
  background:var(--soft); border:1px solid var(--line); border-radius:999px;
  padding:6px 10px; font-size:12px; cursor:pointer; color:var(--muted);
  font-family:'Zen Kaku Gothic New',sans-serif; white-space:nowrap;
}
.icon-btn:active{ background:var(--line); }

/* ── day tabs ── */
.day-tabs{
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
  margin:0 16px 16px;
}
.day-tab{
  border:1px solid var(--line); border-radius:14px;
  padding:10px 0; text-align:center; cursor:pointer;
  background:var(--panel); font-family:'Zen Maru Gothic',sans-serif;
  transition:all .15s;
}
.day-tab .dt-label{ font-size:11px; color:var(--muted); font-weight:700; }
.day-tab .dt-date{ font-size:14px; font-weight:900; margin:2px 0; }
.day-tab .dt-weather{ font-size:20px; line-height:1; }
.day-tab.active{ background:var(--sage); border-color:var(--sage); color:#fff; }
.day-tab.active .dt-label{ color:rgba(255,255,255,.8); }

/* ── 24h horizontal timeline ── */
.timeline-wrap{
  margin-bottom:16px;
  overflow-x:scroll;
  overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  padding:4px 16px 8px;
}
.timeline-wrap::-webkit-scrollbar{ display:none; }
.timeline-row{
  display:flex;
  gap:8px;
  width:max-content;
}

.tl-card{
  scroll-snap-align:start;
  flex-shrink:0;
  width:calc((100vw - 32px - 24px) / 4);
  max-width:96px;
  min-width:72px;
  background:var(--panel);
  border:2px solid var(--line);
  border-radius:14px;
  padding:8px 4px 7px;
  text-align:center;
  cursor:pointer;
  transition:border-color .15s, background .15s, transform .15s;
  -webkit-tap-highlight-color:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.tl-card.past{ opacity:.38; }
.tl-card.lv0{ border-color:var(--c-green-b); background:var(--c-green-s); }
.tl-card.lv1{ border-color:var(--c-yellow-b); background:var(--c-yellow-s); }
.tl-card.lv2{ border-color:var(--c-orange-b); background:var(--c-orange-s); }
.tl-card.lv3{ border-color:var(--c-red-b); background:var(--c-red-s); }
.tl-card.selected{
  transform:scale(1.08);
  box-shadow:0 4px 14px rgba(48,50,45,.18);
  border-width:2.5px;
}
.tl-card.lv0.selected{ border-color:var(--c-green); }
.tl-card.lv1.selected{ border-color:var(--c-yellow); }
.tl-card.lv2.selected{ border-color:var(--c-orange); }
.tl-card.lv3.selected{ border-color:var(--c-red); }

.tl-hour{ font-size:12px; font-weight:700; color:var(--ink); font-family:'Zen Maru Gothic',sans-serif; }
.tl-wi{ font-size:18px; line-height:1; }
.tl-temp{ font-size:11px; font-weight:700; color:var(--ink); }
.tl-badge{ font-size:14px; line-height:1; }

/* ── 散歩ガイドカード ── */
.guide-card{
  margin:0 16px 14px;
  background:var(--panel);
  border:2px solid var(--line);
  border-radius:20px;
  padding:16px;
  box-shadow:var(--shadow);
}
.guide-header{
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.guide-big-badge{
  font-size:28px; line-height:1; flex-shrink:0;
}
.guide-title-block{}
.guide-title{
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:16px; font-weight:900; margin:0 0 3px;
}
.guide-badge-label{
  display:inline-block;
  font-size:11px; font-weight:700; border-radius:999px;
  padding:2px 10px; color:#fff;
}
.badge-green{ background:var(--c-green); }
.badge-yellow{ background:var(--c-yellow); }
.badge-orange{ background:var(--c-orange); }
.badge-red{ background:var(--c-red); }

.guide-stats{
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;
}
.guide-stat{
  background:var(--soft); border:1px solid var(--line);
  border-radius:999px; padding:4px 12px; font-size:12px; font-weight:700;
}
.guide-comment{
  font-size:13px; line-height:1.7; color:var(--ink);
  padding:10px 12px; background:var(--soft); border-radius:10px;
}

/* ── section title ── */
.section-title{
  font-family:'Zen Maru Gothic',sans-serif; font-size:13px; font-weight:900;
  color:var(--muted); margin:0 0 8px 16px; display:flex; align-items:center; gap:8px; letter-spacing:.05em;
  padding-right:16px;
}
.section-title::after{ content:""; height:1px; flex:1; background:var(--line); }

/* ── gear ── */
.gear-section{ margin-bottom:14px; }
.gear-card{
  background:var(--panel); border:1px solid var(--line);
  border-radius:14px; padding:12px 14px; margin:0 16px 8px;
  box-shadow:var(--shadow-sm);
}
.gear-card-title{ font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px; font-family:'Zen Maru Gothic',sans-serif; }
.gear-list-inner{ display:flex; flex-direction:column; gap:5px; }
.gear-item{
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:10px; font-size:13px;
  background:var(--soft); border:1px solid var(--line);
}
.gear-badge{
  font-size:10px; font-weight:700; border-radius:999px;
  padding:2px 7px; white-space:nowrap; flex-shrink:0;
}
.badge-must{ background:var(--sage-s); color:var(--sage); border:1px solid var(--sage); }
.badge-good{ background:var(--amber-s); color:#967000; border:1px solid var(--amber); }
.badge-rec{ background:var(--sky-s); color:#3a7aa0; border:1px solid var(--sky); }
.gear-icon{ font-size:17px; line-height:1; flex-shrink:0; }
.gear-label{ flex:1; }

/* ── misc ── */
.loading{ text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
.error{ background:var(--rose-s); border:1px solid var(--rose); border-radius:14px; padding:14px 16px; margin:0 16px; font-size:13px; }
.error button{ margin-top:8px; border:1px solid var(--rose); background:#fff; border-radius:999px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; }
.hidden{ display:none !important; }

/* ── modals ── */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal-backdrop.hidden{ display:none; }
.modal{
  background:#fff; border-radius:20px; padding:24px;
  max-width:340px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.modal h2{ font-family:'Zen Maru Gothic',sans-serif; font-size:18px; font-weight:900; margin:0 0 8px; }
.modal p{ font-size:13px; color:var(--muted); margin:0 0 16px; line-height:1.7; }
.modal-close{
  margin-top:16px; width:100%; padding:12px;
  background:var(--soft); color:var(--ink); border:1px solid var(--line);
  border-radius:12px; font-size:14px; font-weight:700;
  font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
}

/* sensitivity modal */
.sensitivity-opts{ display:grid; gap:8px; }
.sens-btn{
  border:2px solid var(--line); border-radius:14px; padding:12px 14px;
  background:var(--soft); font-size:14px; font-family:'Zen Maru Gothic',sans-serif;
  font-weight:700; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px;
  transition:border-color .15s, background .15s; width:100%;
}
.sens-btn:hover,.sens-btn.selected{ border-color:var(--sage); background:var(--sage-s); }
.sens-btn .sens-sub{ font-size:11px; color:var(--muted); font-weight:400; display:block; margin-top:1px; }
.modal-save{
  margin-top:16px; width:100%; padding:13px;
  background:var(--sage); color:#fff; border:none; border-radius:12px;
  font-size:15px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
}

/* info modal */
.info-list{ list-style:none; padding:0; margin:0 0 4px; }
.info-list li{ font-size:13px; color:var(--ink); padding:4px 0; border-bottom:1px solid var(--line); }
.info-list li:last-child{ border-bottom:none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <p class="eyebrow">WALK CONCIERGE</p>
      <h1>🐾 ぽんずさんぽ</h1>
      <p class="location-line" id="locationLine">位置情報を取得中…</p>
    </div>
    <div class="header-btns">
      <button class="icon-btn" id="settingsBtn">⚙️ 暑さ・寒さ設定</button>
      <button class="icon-btn" id="infoBtn">ℹ️ 判定基準</button>
    </div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div id="main" class="loading" style="padding:40px 16px">📍 位置情報を取得中…</div>
</div>

<!-- 暑さ寒さ設定モーダル -->
<div class="modal-backdrop hidden" id="sensModal">
  <div class="modal">
    <h2>🐶 暑さ・寒さの感じ方</h2>
    <p>わんちゃんの暑さ・寒さの感じ方を選んでね。後から変更できるよ。</p>
    <div class="sensitivity-opts" id="sensitivityOpts">
      <button class="sens-btn" data-val="hot">🥵 暑がり<span class="sens-sub">暑さに弱い・夏に特に注意したい</span></button>
      <button class="sens-btn" data-val="normal">😊 標準<span class="sens-sub">特に気にならない</span></button>
      <button class="sens-btn" data-val="cold">🥶 寒がり<span class="sens-sub">寒さに弱い・冬に特に注意したい</span></button>
    </div>
    <button class="modal-save" id="sensSave">保存する</button>
  </div>
</div>

<!-- 判定基準モーダル -->
<div class="modal-backdrop hidden" id="infoModal">
  <div class="modal">
    <h2>ℹ️ 判定基準について</h2>
    <p>快適度は以下をもとに算出しています。</p>
    <ul class="info-list">
      <li>🌡️ 気温・体感温度（風速補正）</li>
      <li>🛣️ 路面温度（気温＋日射推定）</li>
      <li>💧 湿度</li>
      <li>☀️ UV指数</li>
      <li>🌬️ 風速</li>
      <li>☔ 降水確率・天気コード</li>
      <li>🐶 わんちゃんの暑がり・寒がり設定</li>
    </ul>
    <p style="margin-top:12px;margin-bottom:0">データ提供：Open-Meteo</p>
    <button class="modal-close" id="infoClose">閉じる</button>
  </div>
</div>

<script>
// ── 定数 ──────────────────────────────────────────────────
const FALLBACK_LAT = 35.6762, FALLBACK_LON = 139.6503;
const RAIN_CODES = new Set([51,53,55,56,57,61,63,65,66,67,71,73,75,77,80,81,82,85,86,95,96,99]);
const SNOW_CODES = new Set([71,73,75,77,85,86]);
const LEVEL = { GREEN:0, YELLOW:1, ORANGE:2, RED:3 };
const LEVEL_EMOJI = ['🟢','🟡','🟠','🔴'];
const LEVEL_CLASS = ['lv0','lv1','lv2','lv3'];
const LEVEL_LABEL = ['快適','少し注意','注意','危険'];
const BADGE_CLS = ['badge-green','badge-yellow','badge-orange','badge-red'];

const WEATHER_NAME = {
  0:'快晴',1:'晴れ',2:'薄曇り',3:'くもり',
  45:'霧',48:'霧',
  51:'霧雨',53:'霧雨',55:'強い霧雨',56:'着氷性霧雨',57:'着氷性霧雨',
  61:'小雨',63:'雨',65:'強い雨',66:'着氷性の雨',67:'着氷性の雨',
  71:'小雪',73:'雪',75:'大雪',77:'細雪',
  80:'にわか雨',81:'にわか雨',82:'激しいにわか雨',
  85:'にわか雪',86:'にわか雪',
  95:'雷雨',96:'雷雨',99:'激しい雷雨',
};

// ── dogProfile ────────────────────────────────────────────
function loadProfile(){ try{ return JSON.parse(localStorage.getItem('dogProfile'))||{}; }catch{ return{}; } }
function saveProfile(p){ localStorage.setItem('dogProfile',JSON.stringify(p)); }
let dogProfile = loadProfile();

function getSensitivityOffset(){
  const s = dogProfile.heatSensitivity||'normal';
  return { heat: s==='hot'?-2:0, cold: s==='cold'?2:0 };
}

// ── 天気 ─────────────────────────────────────────────────
function wIcon(code){
  if(code===0)return'☀️'; if(code===1)return'🌤️'; if(code===2)return'⛅'; if(code===3)return'☁️';
  if(code===45||code===48)return'🌫️';
  if([51,53,55,56,57].includes(code))return'🌦️';
  if([61,63,65,66,67,80,81,82].includes(code))return'🌧️';
  if(SNOW_CODES.has(code))return'🌨️';
  if([95,96,99].includes(code))return'⛈️';
  return'❓';
}
function wName(code){ return WEATHER_NAME[code]||'不明'; }

// ── 路面・体感 ────────────────────────────────────────────
function roadTemp(temp,code){ return temp+(code===0?12:code===1?8:code===2?5:code===3?2:0); }
function feelsLike(temp,wind){ return temp-Math.min(wind*0.5,5); }

// ── 快適度判定（cause付き） ──────────────────────────────
// returns { level:0-3, cause:'heat'|'cold'|'rain'|'none' }
function calcLevel({ temp, code, precip, humidity, wind, uv }){
  const off = getSensitivityOffset();

  if(RAIN_CODES.has(code)||precip>=50) return { level:LEVEL.RED, cause:'rain' };

  const road = roadTemp(temp,code);
  const fl = feelsLike(temp,wind);
  const ho = off.heat, co = off.cold;

  function heatLv(){
    if(road>=42+ho||temp>=31+ho||(temp>=28+ho&&humidity>=80)) return LEVEL.RED;
    if(road>=36+ho||temp>=28+ho||(temp>=25+ho&&(uv||0)>=7)) return LEVEL.ORANGE;
    if(temp>=25+ho||road>=30+ho||(uv||0)>=6) return LEVEL.YELLOW;
    return LEVEL.GREEN;
  }
  function coldLv(){
    if(fl<=-2+co) return LEVEL.RED;
    if(fl<=2+co||(temp<=5+co&&wind>=8)) return LEVEL.ORANGE;
    if(fl<=7+co) return LEVEL.YELLOW;
    return LEVEL.GREEN;
  }

  const hl = heatLv(), cl = coldLv();
  if(hl>=cl) return { level:hl, cause: hl>LEVEL.GREEN?'heat':'none' };
  return { level:cl, cause: cl>LEVEL.GREEN?'cold':'none' };
}

// ── 雨上がり ─────────────────────────────────────────────
function checkRainBefore(data, h){
  for(let i=Math.max(0,h-3);i<h;i++){
    if(data[i]&&RAIN_CODES.has(data[i].code)) return true;
  }
  return false;
}

// ── 夜判定 ───────────────────────────────────────────────
function isNight(h){ return h>=19||h<5; }

// ── 位置情報 ─────────────────────────────────────────────
function getLocation(){
  return new Promise(resolve=>{
    if(!('geolocation' in navigator)){ resolve({lat:FALLBACK_LAT,lon:FALLBACK_LON,source:'fallback'}); return; }
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lon:p.coords.longitude,source:'gps'}),
      ()=>resolve({lat:FALLBACK_LAT,lon:FALLBACK_LON,source:'fallback'}),
      {enableHighAccuracy:false,timeout:8000,maximumAge:600000}
    );
  });
}

// ── 状態 ─────────────────────────────────────────────────
let appData = null;
let activeDay = 0;
let selectedHour = null;

// ── メインロード ─────────────────────────────────────────
async function loadForecast(){
  const main=document.getElementById('main');
  main.className='loading'; main.style.padding='40px 16px'; main.textContent='📍 位置情報を取得中…';
  try{
    const loc=await getLocation();
    main.textContent='⛅ 天気予報を取得中…';

    const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
      +`&hourly=temperature_2m,precipitation_probability,weathercode,relative_humidity_2m,wind_speed_10m,uv_index`
      +`&timezone=Asia%2FTokyo&forecast_days=2`;
    const res=await fetch(url);
    if(!res.ok) throw new Error();
    const data=await res.json();

    const {time,temperature_2m,precipitation_probability,weathercode,relative_humidity_2m,wind_speed_10m,uv_index}=data.hourly;
    const byDate={};
    time.forEach((t,idx)=>{
      const [dp,tp]=t.split('T'); const h=parseInt(tp);
      if(!byDate[dp]) byDate[dp]={};
      byDate[dp][h]={temp:temperature_2m[idx],code:weathercode[idx],precip:precipitation_probability[idx],
        humidity:relative_humidity_2m[idx],wind:wind_speed_10m[idx],uv:uv_index[idx]};
    });

    const now=new Date(), pad=n=>String(n).padStart(2,'0');
    const mkStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const tom=new Date(now.getTime()+86400000);
    const dowL=['日','月','火','水','木','金','土'];
    const days=[
      {dateStr:mkStr(now),date:now,label:'今日',dow:dowL[now.getDay()]},
      {dateStr:mkStr(tom),date:tom,label:'明日',dow:dowL[tom.getDay()]},
    ];
    appData={byDate,days,nowInfo:{dateStr:mkStr(now),hour:now.getHours()},loc};

    const locLabel=loc.source==='gps'?'現在地':'東京（デフォルト）';
    document.getElementById('locationLine').textContent=`📍 ${locLabel} ／ ${now.getMonth()+1}/${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())}取得`;

    renderDayTabs();
    renderDay(0);
  }catch(e){
    main.className=''; main.style.padding='';
    main.innerHTML=`<div class="error">天気予報を取得できなかったよ。<br><button onclick="loadForecast()">再読み込み</button></div>`;
  }
}

// ── タブ ─────────────────────────────────────────────────
function renderDayTabs(){
  const el=document.getElementById('dayTabs');
  const {byDate,days}=appData;
  el.innerHTML=days.map((day,i)=>{
    const data=byDate[day.dateStr]||{};
    const repCode=data[12]?data[12].code:(data[9]?data[9].code:0);
    return `<button class="day-tab${i===activeDay?' active':''}" onclick="renderDay(${i})">
      <div class="dt-label">${day.label}（${day.dow}）</div>
      <div class="dt-weather">${wIcon(repCode)}</div>
      <div class="dt-date">${day.date.getMonth()+1}/${day.date.getDate()}</div>
    </button>`;
  }).join('');
}

// ── 日別描画 ─────────────────────────────────────────────
function renderDay(idx){
  activeDay=idx;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));

  const {byDate,days,nowInfo}=appData;
  const day=days[idx];
  const data=byDate[day.dateStr]||{};
  const isToday=day.dateStr===nowInfo.dateStr;
  const nowHour=nowInfo.hour;

  // 初期選択時間
  if(isToday){
    // 現在時刻の次の時間（なければ現在時刻）
    selectedHour=(nowHour+1<=23)?nowHour+1:nowHour;
  } else {
    selectedHour=0;
  }

  const main=document.getElementById('main');
  main.className=''; main.style.padding='';
  main.innerHTML=`
    <div id="timeline-section"></div>
    <div id="guide-section"></div>
    <div id="gear-section"></div>
  `;

  renderTimeline(data, isToday, nowHour);
  renderGuide(data, isToday, nowHour);
  renderGear(data, nowHour);

  // 選択カードを中央にスクロール
  requestAnimationFrame(()=>scrollToSelected());
}

// ── タイムライン ─────────────────────────────────────────
function renderTimeline(data, isToday, nowHour){
  const hours=Array.from({length:24},(_,h)=>{
    const d=data[h];
    const {level}=d?calcLevel(d):{level:LEVEL.RED,cause:'rain'};
    const isPast=isToday&&h<nowHour;
    return {h,d,level,isPast};
  });

  const cards=hours.map(({h,d,level,isPast})=>{
    const sel=h===selectedHour;
    const wi=d?wIcon(d.code):'❓';
    const temp=d?`${Math.round(d.temp)}°`:'--';
    return `<div class="tl-card ${LEVEL_CLASS[level]}${isPast?' past':''}${sel?' selected':''}" id="tlc-${h}" onclick="selectHour(${h})">
      <span class="tl-hour">${h}時</span>
      <span class="tl-wi">${wi}</span>
      <span class="tl-temp">${temp}</span>
      <span class="tl-badge">${LEVEL_EMOJI[level]}</span>
    </div>`;
  }).join('');

  document.getElementById('timeline-section').innerHTML=`
    <div class="timeline-wrap" id="timelineWrap">
      <div class="timeline-row">${cards}</div>
    </div>`;
}

function scrollToSelected(){
  const wrap=document.getElementById('timelineWrap');
  const card=document.getElementById(`tlc-${selectedHour}`);
  if(!wrap||!card) return;
  const wrapRect=wrap.getBoundingClientRect();
  const cardRect=card.getBoundingClientRect();
  const target=wrap.scrollLeft+(cardRect.left-wrapRect.left)-(wrapRect.width/2)+(cardRect.width/2);
  wrap.scrollTo({left:Math.max(0,target),behavior:'smooth'});
}

function selectHour(h){
  selectedHour=h;
  const {byDate,days,nowInfo}=appData;
  const day=days[activeDay];
  const data=byDate[day.dateStr]||{};
  const isToday=day.dateStr===nowInfo.dateStr;
  const nowHour=nowInfo.hour;

  // カードのselected更新
  document.querySelectorAll('.tl-card').forEach(c=>{
    const ch=parseInt(c.id.replace('tlc-',''));
    c.classList.toggle('selected',ch===h);
  });
  scrollToSelected();

  renderGuide(data, isToday, nowHour);
  renderGear(data, nowHour);
}

// ── 散歩ガイド ────────────────────────────────────────────
function renderGuide(data, isToday, nowHour){
  const h=selectedHour;
  const d=data[h];
  const isPast=isToday&&h<nowHour;
  const rainBefore=isToday&&checkRainBefore(data,h);

  let html='';
  if(!d){
    html=`<div class="guide-card" style="border-color:var(--c-red-b)">
      <div class="guide-header">
        <span class="guide-big-badge">🔴</span>
        <div class="guide-title-block">
          <p class="guide-title">🐶 ${h}時のお散歩ガイド</p>
          <span class="guide-badge-label badge-red">データなし</span>
        </div>
      </div>
    </div>`;
  } else {
    const {level,cause}=calcLevel(d);
    const road=Math.round(roadTemp(d.temp,d.code));
    const borderColors=['var(--c-green-b)','var(--c-yellow-b)','var(--c-orange-b)','var(--c-red-b)'];
    const comment=buildComment(level,cause,d,h,isPast,rainBefore);

    html=`<div class="guide-card" style="border-color:${borderColors[level]}">
      <div class="guide-header">
        <span class="guide-big-badge">${LEVEL_EMOJI[level]}</span>
        <div class="guide-title-block">
          <p class="guide-title">🐶 ${h}時のお散歩ガイド</p>
          <span class="guide-badge-label ${BADGE_CLS[level]}">${LEVEL_LABEL[level]}</span>
        </div>
      </div>
      <div class="guide-stats">
        <span class="guide-stat">${wIcon(d.code)} ${wName(d.code)}</span>
        <span class="guide-stat">🌡️ ${Math.round(d.temp)}℃</span>
        <span class="guide-stat">🛣️ 路面${road}℃</span>
        <span class="guide-stat">💧 湿度${d.humidity}%</span>
      </div>
      <div class="guide-comment">${comment}</div>
    </div>`;
  }
  document.getElementById('guide-section').innerHTML=html;
}

function buildComment(level,cause,d,h,isPast,rainBefore){
  const past=isPast?'（過去の時間です）':'';
  if(level===LEVEL.RED){
    if(cause==='rain') return `☔ 雨や雪が降っています。無理せずお家で遊ぶのもおすすめ。${past}`;
    if(cause==='heat') return `🔥 非常に暑くて危険な時間帯です。散歩は避けて涼しい場所で過ごしてね。${past}`;
    return `🌨️ 体感温度がとても低く危険です。無理せず今日はお家でゆっくりしよう。${past}`;
  }
  if(level===LEVEL.ORANGE){
    if(cause==='heat') return `☀️ 熱中症や肉球やけどに注意しよう。アスファルトを手で触って確認してから出発してね。${past}`;
    if(cause==='cold') return `🧊 防寒をしっかりしてね。短めのお散歩がおすすめ。${past}`;
    return `⚠️ 天候に注意が必要です。様子を見ながら無理しないでね。${past}`;
  }
  if(level===LEVEL.YELLOW){
    if(cause==='heat') return `🌤️ 少し暑めです。短めのお散歩がおすすめ。水を忘れずに。${past}`;
    if(cause==='cold') return `🍃 少し肌寒いです。短めのお散歩がおすすめ。${past}`;
    return `🙂 短めのお散歩がおすすめ。無理しない範囲で楽しんでね。${past}`;
  }
  // GREEN
  if(rainBefore) return `🌈 雨上がりです。地面が濡れているかも。帰ったら足を拭いてあげてね。${past}`;
  if(isNight(h)) return `🌙 夜の散歩です。ライトや反射材で安全に。${past}`;
  if(d.wind>=5) return `💨 風が心地よい時間帯。お散歩日和だよ。${past}`;
  if(d.humidity<60) return `😊 湿度も低くて過ごしやすい時間帯。思いっきり楽しんでね。${past}`;
  return `🐾 涼しくて歩きやすいよ。お散歩日和！${past}`;
}

// ── 持ち物 ───────────────────────────────────────────────
function renderGear(data, nowHour){
  const h=selectedHour;
  const d=data[h];
  if(!d){ document.getElementById('gear-section').innerHTML=''; return; }

  const {level,cause}=calcLevel(d);
  const night=isNight(h);
  const rainBefore=checkRainBefore(data,h);
  const isHot=cause==='heat'&&level>=LEVEL.YELLOW;
  const isCold=cause==='cold'&&level>=LEVEL.YELLOW;
  const isMorning=h>=5&&h<10;

  // 犬用
  const dogItems=[];
  const addDog=(icon,label,badge)=>{
    if(!dogItems.find(x=>x.label===label)) dogItems.push({icon,label,badge});
  };
  addDog('💩','うんち袋','must');
  addDog('🪣','携帯水容器','must');
  if(isHot){ addDog('🧊','保冷剤','must'); addDog('🧻','足拭きタオル','good'); }
  if(rainBefore){ addDog('🧻','足拭きタオル','good'); addDog('🧥','レインコート','good'); }
  if(night){ addDog('💡','ライト','must'); addDog('🦺','反射材','good'); }

  // 飼い主用
  const ownerItems=[];
  const addOwner=(icon,label,badge)=>{
    if(!ownerItems.find(x=>x.label===label)) ownerItems.push({icon,label,badge});
  };
  if(isMorning) addOwner('🧢','帽子','good');
  if(isHot){
    addOwner('🧢','帽子','must');
    addOwner('💧','飲み物','must');
    addOwner('❄️','冷感ネックリング','must');
    addOwner('🧻','タオル','good');
  }
  if(isCold){
    addOwner('🧥','上着','must');
    addOwner('🧤','手袋','good');
    addOwner('🧣','ネックウォーマー','good');
  }
  if(night){
    addOwner('🔦','ライト','must');
    addOwner('🦺','反射材','good');
  }

  const badgeMap={must:['badge-must','🟢 必須'],good:['badge-good','🟡 あると良い'],rec:['badge-rec','🔵 推奨']};
  function items(list){
    return list.map(g=>{
      const [cls,txt]=badgeMap[g.badge]||badgeMap.rec;
      return `<div class="gear-item">
        <span class="gear-icon">${g.icon}</span>
        <span class="gear-label">${g.label}</span>
        <span class="gear-badge ${cls}">${txt}</span>
      </div>`;
    }).join('');
  }

  let html=`<div class="gear-section">`;
  html+=`<div class="section-title">持ち物・装備（${h}時）</div>`;
  html+=`<div class="gear-card"><div class="gear-card-title">🐶 犬用</div><div class="gear-list-inner">${items(dogItems)}</div></div>`;
  if(ownerItems.length){
    html+=`<div class="gear-card"><div class="gear-card-title">👤 飼い主用</div><div class="gear-list-inner">${items(ownerItems)}</div></div>`;
  }
  html+=`</div>`;
  document.getElementById('gear-section').innerHTML=html;
}

// ── 設定モーダル ─────────────────────────────────────────
function openSensModal(){
  const cur=dogProfile.heatSensitivity||'normal';
  document.querySelectorAll('.sens-btn').forEach(b=>b.classList.toggle('selected',b.dataset.val===cur));
  document.getElementById('sensModal').classList.remove('hidden');
}
document.querySelectorAll('.sens-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sens-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});
document.getElementById('sensSave').addEventListener('click',()=>{
  const sel=document.querySelector('.sens-btn.selected');
  if(sel){ dogProfile.heatSensitivity=sel.dataset.val; saveProfile(dogProfile); }
  document.getElementById('sensModal').classList.add('hidden');
  if(appData) renderDay(activeDay);
});
document.getElementById('sensModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('sensModal')) document.getElementById('sensModal').classList.add('hidden');
});
document.getElementById('settingsBtn').addEventListener('click',openSensModal);

// ── 判定基準モーダル ──────────────────────────────────────
document.getElementById('infoBtn').addEventListener('click',()=>{
  document.getElementById('infoModal').classList.remove('hidden');
});
document.getElementById('infoClose').addEventListener('click',()=>{
  document.getElementById('infoModal').classList.add('hidden');
});
document.getElementById('infoModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('infoModal')) document.getElementById('infoModal').classList.add('hidden');
});

// ── 初回設定 & 起動 ──────────────────────────────────────
if(!dogProfile.heatSensitivity) openSensModal();
loadForecast();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
